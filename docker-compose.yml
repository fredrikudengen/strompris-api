services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: strompris
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql://admin:secret@db/strompris
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
volumes:
  postgres_data:


